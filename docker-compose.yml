version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: commodities_db
    environment:
      POSTGRES_DB: ${DB_NAME:-commodities_trading}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_dev}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: commodities_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commodities_backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-5000}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-commodities_trading}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres_dev}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IEX_CLOUD_API_KEY=${IEX_CLOUD_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - ENABLE_EIA_MONITOR=${ENABLE_EIA_MONITOR:-true}
      - ENABLE_USDA_MONITOR=${ENABLE_USDA_MONITOR:-true}
      - ENABLE_COT_ANALYSIS=${ENABLE_COT_ANALYSIS:-true}
      - ENABLE_NEWS_AGGREGATION=${ENABLE_NEWS_AGGREGATION:-true}
      - ENABLE_RADIO_STREAMING=${ENABLE_RADIO_STREAMING:-true}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: commodities_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
    command: npm run dev

volumes:
  db_data:
  redis_data:

networks:
  default:
    name: commodities_network
